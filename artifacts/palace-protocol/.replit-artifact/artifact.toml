kind = "web"
previewPath = "/"
title = "Palace Protocol Academy"
version = "1.0.0"
id = "artifacts/palace-protocol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22636

[services.development]
run = "pnpm --filter @workspace/palace-protocol run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/palace-protocol", "run", "build" ]
publicDir = "artifacts/palace-protocol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22636"
BASE_PATH = "/"
